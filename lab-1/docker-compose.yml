volumes:
  postgres_data:
  pgadmin_data:

services:
  postgres:
    image: 'docker.io/library/postgres:17'

    environment:
      POSTGRES_DB: '$POSTGRES_DB'
      POSTGRES_USER: '$POSTGRES_USER'
      POSTGRES_PASSWORD: '$POSTGRES_PASSWORD'
    volumes:
      - './import.sh:/docker-entrypoint-initdb.d/00-init.sh:ro'
      - './normalize.sh:/docker-entrypoint-initdb.d/10-normalize.sh:ro'
      - './source:/source:ro'
      - 'postgres_data:/var/lib/postgresql/docker/17'

  pgadmin:
    image: 'docker.io/dpage/pgadmin4:9'

    environment:
      PGADMIN_DEFAULT_EMAIL: '$PGADMIN_EMAIL'
      PGADMIN_DEFAULT_PASSWORD: '$PGADMIN_PASSWORD'
    volumes:
      - 'pgadmin_data:/var/lib/pgadmin'

    ports:
      - '5050:80'

    depends_on:
      - 'postgres'
